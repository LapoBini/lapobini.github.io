{{/* Custom fonts (Lato headings/nav + Open Sans body, à la sites.google.com/view/titan-alon)
     and research-page section-title tweaks. Injected at the end of <head>. */}}

{{/* Light theme only: override any previously-saved dark preference. */}}
<script>
  try { localStorage.removeItem('wc-color-theme'); } catch (e) {}
  document.documentElement.classList.remove('dark');
  document.documentElement.style.colorScheme = 'light';
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;1,400&family=Open+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap">

<style>
  :root {
    --hb-font-body: 'Open Sans', ui-sans-serif, system-ui, -apple-system, sans-serif;
    --hb-font-head: 'Lato', 'Open Sans', sans-serif;
    --page-bg: #faf9f6;   /* warm off-white ("paper") */
  }

  /* Body text */
  html, body, .page-wrapper { font-family: var(--hb-font-body); }

  /* Very light "petroleum" page background (pale teal-gray, à la the Hamilton book) */
  html, body { background-color: var(--page-bg); }
  /* Sticky header shares the same tint (it's opaque white by default) */
  #site-header, .header { background-color: var(--page-bg) !important; }

  /* Headings, nav, and section titles use the Lato face (like the reference site) */
  h1, h2, h3, h4, h5, h6,
  .navbar-brand, .nav-link,
  .blox-collection .text-3xl { font-family: var(--hb-font-head); }

  /* ---- Research & Teaching: section titles styled like "Bio" / "Latest Research"
     (Oswald, 24px, weight 700, no uppercase), left-aligned ---- */
  #working-papers .text-3xl,
  #ongoing-projects .text-3xl,
  #presentations .text-3xl,
  #teaching-material .text-3xl,
  #code .text-3xl {
    text-align: left;
    width: 100%;
    font-size: 20px;           /* match Bio's h2 (was text-3xl / 30px) */
    line-height: 32px;
    font-weight: 700;
    text-transform: none;
    letter-spacing: normal;
    color: #000;
    margin-bottom: 0.5rem;     /* was mb-6 (1.5rem) */
  }
  /* Title wrapper — left-align, same 48rem content box on both pages */
  #working-papers .max-w-prose,
  #ongoing-projects .max-w-prose,
  #presentations .max-w-prose,
  #teaching-material .max-w-prose,
  #code .max-w-prose {
    align-items: flex-start;   /* left-align within the flex column */
    width: 100%;
    max-width: 48rem;          /* = max-w-3xl, identical left edge on Research & Teaching */
    text-align: left;
  }
  /* Presentations content (markdown block): compact, readable, left-aligned */
  #presentations .prose {
    max-width: none;
    width: 100%;
    font-size: 0.9rem;
    line-height: 1.5;
    color: #000;
  }
  /* Year labels styled like the bold "Lapo Bini" author name (Open Sans, 16px, 700) */
  #presentations .prose > p {
    font-family: 'Open Sans', ui-sans-serif, system-ui, sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #000;
    margin: 0.9rem 0 0.2rem;
  }
  #presentations .prose > p:first-child { margin-top: 0; }
  #presentations .prose ul { margin: 0; padding-left: 1.2rem; list-style: disc; }
  #presentations .prose li { margin: 0.1rem 0; }
  /* Conference links: keep the name black, append a small gray external-link arrow.
     Conferences with no link stay plain text (no icon). */
  #presentations .prose a { color: #000; text-decoration: none; }
  #presentations .prose a::after {
    content: "\2197";                /* ↗ */
    margin-left: 0.22em;
    font-size: 0.8em;
    color: #6b7280;                  /* subtle gray */
  }
  #presentations .prose a:hover { text-decoration: underline; text-decoration-color: #9ca3af; }
  #presentations .prose a:hover::after { color: #111827; }
  /* Research: pull the citation list up to its title */
  #working-papers .container.max-w-3xl,
  #ongoing-projects .container.max-w-3xl {
    margin-top: 1rem !important;   /* overrides mt-16 / sm:mt-20 */
  }
  /* Teaching: narrow the article grid to the same 48rem box (was max-w-screen-lg + px-8)
     so titles & cards line up with each other AND sit at the same x as the Research page */
  #teaching-material .container.max-w-screen-lg,
  #code .container.max-w-screen-lg {
    max-width: 48rem;
    padding-left: 0;
    padding-right: 0;
    padding-top: 0.5rem !important;   /* was py-5 / lg:py-8 */
  }
  /* Teaching/Code cards: show only title + subtitle — hide the date footer */
  #teaching-material .group .flex-none:has(time),
  #code .group .flex-none:has(time) { display: none; }
  /* Match the Research title→buttons gap (~2px): tighten card title→subtitle */
  #teaching-material .group .grow p,
  #code .group .grow p { margin-top: 2px; }
  /* Course / code titles styled like the bold author name "Lapo Bini" in citations
     (Open Sans, 16px, weight 700, black) */
  #teaching-material .group h2,
  #code .group h2 {
    font-family: 'Open Sans', ui-sans-serif, system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.4;
    font-weight: 700;
    text-transform: none;
    color: #000;
  }
  /* Match the Research inter-paper gap (28px) between Teaching cards (was gap-10 / 40px) */
  #teaching-material .grid,
  #code .grid { gap: 1.75rem; }

  /* ---- Homepage hero ---- */
  /* Resize the wrapper (theme fixes it at 150x150) to the rectangle so the photo
     doesn't overflow onto the social icons. */
  #section-resume-biography-3 .avatar-wrapper { margin-top: 1rem; width: 300px; height: 375px; }
  /* Profile photo as a sharp-cornered rectangle (override the theme's circular .avatar). */
  #section-resume-biography-3 .avatar-rect {
    border-radius: 0;
    width: 100%;
    height: 100%;
    max-width: none;
    max-height: none;
    object-fit: cover;
    padding: 0;
  }
  /* More breathing room between the avatar and the social icons (overrides the
     theme's .network-icon margin-top:.5rem). */
  #section-resume-biography-3 #profile .network-icon { margin-top: 2.25rem; }

  /* Align the top of "Bio" with the top of the avatar circle.
     (The column was md:mt-12 = 3rem; the "Bio" h2 carried a prose top-margin + pt-2.) */
  #section-resume-biography-3 .flex-auto.max-w-prose { margin-top: 1rem; }  /* = avatar-wrapper margin-top */
  #section-resume-biography-3 .flex-auto.max-w-prose .prose { padding-top: 0; }  /* drop pt-2 */
  #section-resume-biography-3 #bio { margin-top: 0; font-size: 20px; line-height: 32px; }  /* sit "Bio" flush; match the "Lapo Bini" brand size (20px) */
  #section-resume-biography-3 #profile { padding-top: 0; }  /* remove the 30px that pushed the avatar below Bio */
  /* Move the bio text closer to the "Bio" heading */
  #section-resume-biography-3 .bio-text #bio { margin-bottom: 0; }
  #section-resume-biography-3 .bio-text #bio + p { margin-top: 0.4rem; }
  /* Two bio paragraphs: same gap as Bio→text (0.4rem) before the 2nd (Now-Casting) one */
  #section-resume-biography-3 .bio-text p { margin-bottom: 0; }
  #section-resume-biography-3 .bio-text p + p { margin-top: 0.4rem; }

  /* ---- Homepage "Latest Research": style like the "Bio" heading, and align
     the title + list under the Bio column (large screens) ---- */
  #latest-research .text-3xl {
    font-size: 20px;          /* match Bio's h2 (was text-3xl / 30px) */
    line-height: 32px;
    margin-bottom: 0.5rem;    /* was mb-6 */
  }
  /* Tighten the spacing between papers in Latest Research only (Research page unchanged).
     !important overrides the inline style="margin-bottom:1rem" on each citation item. */
  #latest-research .pub-list-item { margin-bottom: 0.4rem !important; }
  @media (min-width: 1024px) {
    /* Pull the whole section up into the empty space to the right of the (taller)
       profile column, so it sits just below Bio and everything fits on one screen.
       Bio is untouched (it stays aligned with the avatar). */
    #latest-research { margin-top: -172px; }   /* recalibrated for the larger photo */
    /* The hero centres an 854px group; Bio sits 259px in (avatar width + gap).
       Reproduce that offset so the heading and list line up under Bio. */
    #latest-research .max-w-prose {
      align-items: flex-start;
      max-width: 962px;
      padding-left: 368px;
    }
    #latest-research .container.max-w-3xl {
      max-width: 962px;
      padding-left: 368px;
      margin-top: 0.25rem !important;   /* papers closer to the "Latest Research" title */
    }
    /* The pulled-up section's box overlaps the profile column (social icons + CV
       button). Let clicks pass through its empty area, keeping only the actual
       content (which sits to the right of the profile) clickable. */
    #latest-research { pointer-events: none; }
    #latest-research .text-3xl,
    #latest-research .container.max-w-3xl > * { pointer-events: auto; }
  }

  /* ---- Mobile / narrow screens (< lg): left-align every collection title and add
     the same 12px side padding as the Bio, so titles, lists and abstracts aren't
     flush against the screen edges and "Latest Research" lines up like the rest. ---- */
  @media (max-width: 1023px) {
    #latest-research .max-w-prose,
    #working-papers .max-w-prose,
    #ongoing-projects .max-w-prose,
    #presentations .max-w-prose,
    #teaching-material .max-w-prose,
    #code .max-w-prose {
      align-items: flex-start;
      text-align: left;
      padding-left: 0.75rem;
      padding-right: 0.75rem;
    }
    #latest-research .container.max-w-3xl,
    #working-papers .container.max-w-3xl,
    #ongoing-projects .container.max-w-3xl,
    #teaching-material .container.max-w-screen-lg,
    #code .container.max-w-screen-lg {
      padding-left: 0.75rem;
      padding-right: 0.75rem;
    }
    /* Latest Research: a touch more space below the Bio, and pull the first paper
       up close to the "Latest Research" title (was a big mt-16 gap). */
    #latest-research { margin-top: 0.875rem; }
    #latest-research .container.max-w-3xl { margin-top: 0.5rem !important; }
  }

  /* ---- Phones (hero stacked, < md): shift Bio + Latest Research up by tightening
     the gap between the profile photo and the Bio. ---- */
  @media (max-width: 767px) {
    #section-resume-biography-3 .resume-biography { gap: 1rem; }     /* was gap-12 (3rem) */
    #section-resume-biography-3 .flex-auto.max-w-prose { margin-top: 0; }  /* drop the 1rem */
  }

  /* ---- Light theme: make all body copy solid black (incl. the Bio) ---- */
  .prose-slate {
    --tw-prose-body: #000;
    --tw-prose-headings: #000;
    --tw-prose-bold: #000;
    --tw-prose-lead: #000;
  }
  .bio-text, .bio-text p, .bio-text li, #bio { color: #000; }

  /* ---- Bio text: match the reference site's bio (Lato, ~14.67px / 11pt,
     line-height 1.667) — sites.google.com/view/titan-alon ---- */
  #section-resume-biography-3 .bio-text,
  #section-resume-biography-3 .bio-text p,
  #section-resume-biography-3 .bio-text li {
    font-family: 'Lato', ui-sans-serif, system-ui, sans-serif;
    font-size: 14.6667px;
    line-height: 1.667;
  }

  /* ---- Paper titles in blue, keeping the underline ---- */
  .view-citation a.underline {
    color: #1d4ed8;                    /* blue-700 */
    text-decoration-line: underline;
    text-decoration-color: #1d4ed8;
  }
  .view-citation a.underline:hover { color: #1e40af; text-decoration-color: #1e40af; }

  /* ---- Course (docs) pages: body text in the same font/size as the abstract
     (Lato, 14.67px); the page title and section headings keep their own sizes. ---- */
  .prose.lg\:prose-xl p,
  .prose.lg\:prose-xl li {
    font-family: 'Lato', ui-sans-serif, system-ui, sans-serif;
    font-size: 14.6667px;
    line-height: 1.667;
  }

  /* ---- Course material: emphasise the topic of each session in bold (was orange) ---- */
  .hl-term { font-weight: 700; color: #000; }

  /* ---- Course material links (Slides, Test, …) styled like the paper titles ---- */
  .prose.lg\:prose-xl a {
    color: #1d4ed8;                    /* blue-700 */
    text-decoration: underline;
    text-decoration-color: #1d4ed8;
  }
  .prose.lg\:prose-xl a:hover { color: #1e40af; }
  /* …but the previous/next pager (next-in-series, inside .no-prose) should be green,
     matching the paper pages — not blue/underlined. */
  .prose.lg\:prose-xl .no-prose a {
    color: rgb(var(--color-primary-600));
    text-decoration: none;
  }

  /* ---- Attachment buttons (PDF, APPENDIX, CITE, ABSTRACT, EARLY DRAFT) in a
     professional gray instead of green ---- */
  .hb-attachment-link { color: #6b7280; }
  .hb-attachment-link:hover { color: #4b5563; }

  /* ---- Abstract toggle: the "ABSTRACT" button reveals/hides the abstract ---- */
  .view-citation .abstract-btn { cursor: pointer; }
  /* Abstract text (toggle panel + paper detail page) uses the same font as the Bio:
     Lato, 14.67px, line-height 1.667. */
  .view-citation .abstract-panel,
  .abstract-body {
    font-family: 'Lato', ui-sans-serif, system-ui, sans-serif;
    font-size: 14.6667px;
    line-height: 1.667;
    color: #000;
  }
  .view-citation .abstract-panel {
    display: none;                     /* hidden until the toggle is checked */
    margin-top: 0.5rem;
    max-width: 48rem;
    text-align: justify;
  }
  .view-citation .abstract-toggle:checked ~ .abstract-panel { display: block; }

  /* Research page (Working Papers + Ongoing Projects): show the abstract inline and
     drop the ABSTRACT toggle button. Latest Research (homepage) keeps the toggle. */
  #working-papers .view-citation .abstract-panel,
  #ongoing-projects .view-citation .abstract-panel { display: block; }
  #working-papers .view-citation .abstract-btn,
  #ongoing-projects .view-citation .abstract-btn { display: none; }

  /* ---- Navbar: nudge the name in from the left, keeping it symmetric with the
     search icon on the right (both 2rem from the edge). ---- */
  nav.navbar { padding-left: 2rem; padding-right: 2rem; }
  /* Search removed: drop the menu's right margin (was spacing it from the search)
     so the last nav item is symmetric with the name on the left. */
  #nav-menu { margin-right: 0; }

  /* ---- Nav links: bold only for the section you're currently on ---- */
  .nav-link { font-weight: 400; }
  .nav-link.active { font-weight: 700; }
</style>
