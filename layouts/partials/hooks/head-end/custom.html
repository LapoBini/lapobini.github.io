{{/* Custom fonts (Oswald headings + Open Sans body, à la sites.google.com/view/juanherreno)
     and research-page section-title tweaks. Injected at the end of <head>. */}}

{{/* Light theme only: override any previously-saved dark preference. */}}
<script>
  try { localStorage.removeItem('wc-color-theme'); } catch (e) {}
  document.documentElement.classList.remove('dark');
  document.documentElement.style.colorScheme = 'light';
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,600;0,700;1,400&family=Oswald:wght@300;400;500;600;700&display=swap">

<style>
  :root {
    --hb-font-body: 'Open Sans', ui-sans-serif, system-ui, -apple-system, sans-serif;
    --hb-font-head: 'Oswald', 'Open Sans', sans-serif;
  }

  /* Body text */
  html, body, .page-wrapper { font-family: var(--hb-font-body); }

  /* Headings, nav, and section titles use the condensed Oswald face */
  h1, h2, h3, h4, h5, h6,
  .navbar-brand, .nav-link,
  .blox-collection .text-3xl { font-family: var(--hb-font-head); }

  /* ---- Research & Teaching: section titles styled like "Bio" / "Latest Research"
     (Oswald, 24px, weight 700, no uppercase), left-aligned ---- */
  #working-papers .text-3xl,
  #ongoing-projects .text-3xl,
  #teaching-material .text-3xl,
  #code .text-3xl {
    text-align: left;
    width: 100%;
    font-size: 24px;           /* match Bio's h2 (was text-3xl / 30px) */
    line-height: 32px;
    font-weight: 700;
    text-transform: none;
    letter-spacing: normal;
    color: #000;
    margin-bottom: 0.5rem;     /* was mb-6 (1.5rem) */
  }
  /* Title wrapper — left-align, same 48rem content box on both pages */
  #working-papers .max-w-prose,
  #ongoing-projects .max-w-prose,
  #teaching-material .max-w-prose,
  #code .max-w-prose {
    align-items: flex-start;   /* left-align within the flex column */
    width: 100%;
    max-width: 48rem;          /* = max-w-3xl, identical left edge on Research & Teaching */
    text-align: left;
  }
  /* Research: pull the citation list up to its title */
  #working-papers .container.max-w-3xl,
  #ongoing-projects .container.max-w-3xl {
    margin-top: 1rem !important;   /* overrides mt-16 / sm:mt-20 */
  }
  /* Teaching: narrow the article grid to the same 48rem box (was max-w-screen-lg + px-8)
     so titles & cards line up with each other AND sit at the same x as the Research page */
  #teaching-material .container.max-w-screen-lg,
  #code .container.max-w-screen-lg {
    max-width: 48rem;
    padding-left: 0;
    padding-right: 0;
    padding-top: 0.5rem !important;   /* was py-5 / lg:py-8 */
  }
  /* Teaching/Code cards: show only title + subtitle — hide the date footer */
  #teaching-material .group .flex-none:has(time),
  #code .group .flex-none:has(time) { display: none; }
  /* Match the Research title→buttons gap (~2px): tighten card title→subtitle */
  #teaching-material .group .grow p,
  #code .group .grow p { margin-top: 2px; }
  /* Course / code titles styled like the bold author name "Lapo Bini" in citations
     (Open Sans, 16px, weight 700, black) */
  #teaching-material .group h2,
  #code .group h2 {
    font-family: 'Open Sans', ui-sans-serif, system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.4;
    font-weight: 700;
    text-transform: none;
    color: #000;
  }
  /* Match the Research inter-paper gap (28px) between Teaching cards (was gap-10 / 40px) */
  #teaching-material .grid,
  #code .grid { gap: 1.75rem; }

  /* ---- Homepage hero ---- */
  #section-resume-biography-3 .avatar-wrapper { margin-top: 1rem; }   /* was mt-10 (2.5rem) */

  /* Align the top of "Bio" with the top of the avatar circle.
     (The column was md:mt-12 = 3rem; the "Bio" h2 carried a prose top-margin + pt-2.) */
  #section-resume-biography-3 .flex-auto.max-w-prose { margin-top: 1rem; }  /* = avatar-wrapper margin-top */
  #section-resume-biography-3 .flex-auto.max-w-prose .prose { padding-top: 0; }  /* drop pt-2 */
  #section-resume-biography-3 #bio { margin-top: 0; }  /* sit "Bio" flush at the column top */
  #section-resume-biography-3 #profile { padding-top: 0; }  /* remove the 30px that pushed the avatar below Bio */

  /* ---- Homepage "Latest Research": style like the "Bio" heading, and align
     the title + list under the Bio column (large screens) ---- */
  #latest-research .text-3xl {
    font-size: 24px;          /* match Bio's h2 (was text-3xl / 30px) */
    line-height: 32px;
    margin-bottom: 0.5rem;    /* was mb-6 */
  }
  @media (min-width: 1024px) {
    /* Pull the whole section up into the empty space to the right of the (taller)
       profile column, so it sits just below Bio and everything fits on one screen.
       Bio is untouched (it stays aligned with the avatar). */
    #latest-research { margin-top: -110px; }
    /* The hero centres an 854px group; Bio sits 259px in (avatar width + gap).
       Reproduce that offset so the heading and list line up under Bio. */
    #latest-research .max-w-prose {
      align-items: flex-start;
      max-width: 854px;
      padding-left: 259px;
    }
    #latest-research .container.max-w-3xl {
      max-width: 854px;
      padding-left: 259px;
      margin-top: 1rem !important;   /* pull list up to its title (was mt-16 / sm:mt-20) */
    }
  }

  /* ---- Light theme: make all body copy solid black (incl. the Bio) ---- */
  .prose-slate {
    --tw-prose-body: #000;
    --tw-prose-headings: #000;
    --tw-prose-bold: #000;
    --tw-prose-lead: #000;
  }
  .bio-text, .bio-text p, .bio-text li, #bio { color: #000; }

  /* ---- Paper titles in blue, keeping the underline ---- */
  .view-citation a.underline {
    color: #1d4ed8;                    /* blue-700 */
    text-decoration-line: underline;
    text-decoration-color: #1d4ed8;
  }
  .view-citation a.underline:hover { color: #1e40af; text-decoration-color: #1e40af; }
</style>
