# Navigation Links
#   To link a homepage widget, specify the URL as a hash `#` followed by the filename of the
  #     desired widget in your `content/home/` folder.
  #   The weight parameter defines the order that the links will appear in.

main:
  - name: Home
    url: /
    weight: 10
  - name: Research
    url: publication/
    weight: 11
  - name: Vita
    # Opens the same CV PDF as the homepage "Download CV" button (in a new tab).
    # Full URL (not /resume.pdf) so the theme adds target="_blank".
    url: https://lapobini.github.io/resume.pdf
    weight: 20
  - name: Teaching
    url: teaching/
    weight: 40
  - name: Code
    url: projects/
    weight: 50
